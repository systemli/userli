sonar.projectKey=systemli_userli
sonar.organization=systemli

sonar.sources=src/,assets/
sonar.tests=tests/
sonar.exclusions=src/DataFixtures/**
sonar.cpd.exclusions=src/DataFixtures/**

# Doctrine repositories naturally accumulate query methods; the "too many methods" rule is not applicable
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e1.resourceKey=src/Repository/**

sonar.php.tests.reportPath=build/result-phpunit.xml
sonar.php.coverage.reportPaths=build/clover-phpunit.xml,build/clover-behat.xml
sonar.php.file.suffixes=php

sonar.javascript.lcov.reportPaths=build/coverage-js/lcov.info
sonar.typescript.lcov.reportPaths=build/coverage-js/lcov.info
