name: Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04
    name: PHPUnit & Behat
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.4"
          extensions: openssl, sodium
          coverage: pcov
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-scripts

      - name: Check Code Style
        run: composer cs-check

      - name: Prepare Database Schema
        run: bin/console doctrine:schema:create --env=test

      - name: Prepare Assets
        run: |
          yarn install --frozen-lockfile
          yarn encore dev

      - name: Vitest
        run: yarn test:coverage

      - name: PHPUnit
        run: |
          bin/phpunit --coverage-clover build/clover-phpunit.xml --log-junit build/result-phpunit.xml

      - name: Behat
        run: |
          bin/console cache:clear --env=test
          bin/behat --format progress
        env:
          PANTHER_CHROME_ARGUMENTS: '--disable-gpu --headless --no-sandbox --disable-dev-shm-usage'
          PANTHER_NO_SANDBOX: 1

      - name: SonarCloud Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    runs-on: ubuntu-24.04
    name: Build & Push Docker Image
    if: github.actor != 'dependabot[bot]'
    needs: test
    concurrency:
      group: docker-build-push-${{ github.head_ref || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

      - name: Build & Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          file: docker/userli/Dockerfile
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: systemli/userli:latest
          cache-from: |
            ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'type=registry,ref=systemli/userli:buildcache' || '' }}
            type=gha
          cache-to: |
            ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'type=registry,ref=systemli/userli:buildcache' || '' }}
            type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
