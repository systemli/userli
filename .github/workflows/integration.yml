name: Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04
    name: PHPUnit & Behat
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: openssl, sodium
          coverage: pcov
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-scripts

      - name: Check Code Style
        run: composer cs-check

      - name: Prepare Database Schema
        run: bin/console doctrine:schema:create --env=test

      - name: Prepare Assets
        run: |
          yarn install --frozen-lockfile
          yarn encore dev

      - name: Vitest
        run: yarn test:coverage

      - name: PHPUnit
        run: |
          bin/phpunit --coverage-clover build/clover-phpunit.xml --log-junit build/result-phpunit.xml

      - name: Behat
        run: |
          bin/console cache:clear --env=test
          bin/behat --format progress
        env:
          PANTHER_CHROME_ARGUMENTS: '--disable-gpu --headless --no-sandbox --disable-dev-shm-usage'
          PANTHER_NO_SANDBOX: 1

      - name: SonarCloud Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    runs-on: ubuntu-24.04
    name: Build & Push Docker Image
    if: github.actor != 'dependabot[bot]'
    needs: test
    concurrency:
      group: docker-build-push-${{ github.head_ref || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

      - name: Build & Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: ${{ github.ref == 'refs/heads/main' }}
          file: docker/userli/Dockerfile
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: systemli/userli:latest
          cache-from: |
            ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'type=registry,ref=systemli/userli:buildcache' || '' }}
            type=gha
          cache-to: |
            ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'type=registry,ref=systemli/userli:buildcache' || '' }}
            type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
