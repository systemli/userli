name: Composer Update

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-24.04
    name: Update Composer Dependencies
    steps:
      - name: Obtain Access Token
        id: access_token
        run: |
          TOKEN="$(npx obtain-github-app-installation-access-token ci ${{ secrets.SYSTEMLI_APP_CREDENTIALS_TOKEN }})"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: openssl, sodium
          tools: composer

      - name: Install dependencies
        run: composer install --no-scripts

      - name: Update dependencies
        run: composer update --no-scripts

      - name: Generate update summary
        run: |
          composer global config allow-plugins.ion-bazan/composer-diff true
          composer global require ion-bazan/composer-diff
          {
            echo "## Composer Update Summary"
            echo ""
            composer diff -l -f mdtable 2>/dev/null || echo "No changes detected."
          } > /tmp/composer-diff.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.access_token.outputs.token }}
          commit-message: "⬆️ Update composer dependencies"
          branch: automated/composer-update
          title: "⬆️ Update composer dependencies"
          body-path: /tmp/composer-diff.md
          draft: true
