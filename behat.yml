default:
  suites:
    default:
      contexts:
        - App\Tests\Behat\FeatureContext: ~
        - App\Tests\Behat\ApiContext: ~

  extensions:
    FriendsOfBehat\SymfonyExtension:
      bootstrap: "tests/bootstrap.php"
      kernel:
        class: ~
        path: ~
        environment: ~
        debug: ~

    Robertfausk\Behat\PantherExtension: ~

    Behat\MinkExtension:
      javascript_session: panther
      sessions:
        symfony:
          symfony: ~
        panther:
          panther:
            options:
              browser: 'chrome'
              webServerDir: '%paths.base%/public'
            manager_options:
              capabilities:
                goog:chromeOptions:
                  args:
                    - '--accept-lang=en'

    DVDoug\Behat\CodeCoverage\Extension:
      filter:
        include:
          directories:
            'src': ~
        exclude:
          directories:
            'src/DataFixtures': ~
      reports:
        clover:
          target: build/clover-behat.xml
          name: 'Behat'
        text:
          showOnlySummary: true
