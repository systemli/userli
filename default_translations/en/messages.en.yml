    headline: Set up your email account
    text: You can find guides on the web for setting up your email account with various client programs.
    text-webmail: >
      You can use your email account via our <a href="%webmail_url%">webmail</a>
      or set it up with a client program of your choice.
  security:
    headline: Secure your account
    text: >
      You can <a href="%app_url%/account/twofactor">enable two-factor authentication</a>
      to protect your account with a second factor when logging in.
      You will need a TOTP app such as
      Aegis (Android) or Tofu (iOS).
  openpgp:
    headline: Publish your OpenPGP key
    text: >
      You can <a href="%app_url%/account/openpgp">upload your OpenPGP key</a>
      to publish it in our Web Key Directory.
      This helps others automatically discover your key when they
      want to send you an encrypted email.
